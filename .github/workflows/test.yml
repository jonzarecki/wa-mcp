name: Test

on:
  push:
    branches-ignore:
      - main
  workflow_call:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt check
        run: test -z "$(gofmt -l .)" || { gofmt -l . && exit 1; }

      - name: Build with FTS5
        run: CGO_ENABLED=1 go build -tags sqlite_fts5 -o /dev/null ./cmd/whatsapp-mcp
